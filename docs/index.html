<!doctype html>
<html lang="ja">
<head>
  <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#4F7DC9">
  <meta charset="UTF-8">
  <title>Octocat バスボム 離型ガイド / Octocat Bath Bomb Demolding Guide</title>
  <meta name="description" content="3D プリント型から Octocat バスボムを崩さずに取り出すための公式ガイド (JA/EN)。Trial 02 の実体験ベース。">
  <meta property="og:title" content="Octocat バスボム 離型ガイド / Demolding Guide">
  <meta property="og:description" content="3D プリント型から Octocat バスボムを崩さずに取り出す手順を解説した GitHub Pages ガイド。日本語・英語対応。">
  <meta property="og:type" content="article">
  <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Roboto:400,300,500,700">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; }
    #toolbar {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 10000;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .12);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar-group { display: flex; align-items: center; gap: 6px; }
    .toolbar-label {
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }
    .toolbar-select {
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }
    .toolbar-select:hover { border-color: #4F7DC9; }
    #content-frame {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-group">
      <label class="toolbar-label" for="lang-selector">🌐</label>
      <select id="lang-selector" class="toolbar-select"></select>
    </div>
    <div class="toolbar-group">
      <label class="toolbar-label" for="version-selector">バージョン:</label>
      <select id="version-selector" class="toolbar-select"></select>
    </div>
  </div>

  <iframe id="content-frame" src="" allow="autoplay"></iframe>

  <script>
    (async function () {
      const FALLBACK_PATH = 'versions/v1.0.0/index.html';
      try {
        const response = await fetch('versions.json', { cache: 'no-store' });
        const data = await response.json();

        const versionSelector = document.getElementById('version-selector');
        const langSelector = document.getElementById('lang-selector');
        const iframe = document.getElementById('content-frame');

        const languages = data.languages || [{ id: 'ja', name: '日本語' }];
        languages.forEach(l => {
          const opt = document.createElement('option');
          opt.value = l.id;
          opt.textContent = l.name;
          langSelector.appendChild(opt);
        });

        data.versions.forEach(version => {
          const option = document.createElement('option');
          option.value = version.id;
          option.textContent = version.name;
          versionSelector.appendChild(option);
        });

        const urlParams = new URLSearchParams(window.location.search);
        const requestedVersionId = urlParams.get('version') || data.defaultVersion;
        const requestedLangId = urlParams.get('lang') || data.defaultLang || 'ja';

        let selectedVersion =
          data.versions.find(v => v.id === requestedVersionId) ||
          data.versions.find(v => v.id === data.defaultVersion);
        let selectedLang =
          languages.find(l => l.id === requestedLangId) ||
          languages.find(l => l.id === (data.defaultLang || 'ja'));

        function pathFor(version, langId) {
          if (version.paths && version.paths[langId]) return version.paths[langId];
          if (version.paths && version.paths[data.defaultLang]) return version.paths[data.defaultLang];
          if (version.path) return version.path;
          return FALLBACK_PATH;
        }

        function syncIframe() {
          iframe.src = pathFor(selectedVersion, selectedLang.id) + (window.location.hash || '');
        }

        function syncUrl() {
          const newUrl = new URL(window.location);
          newUrl.searchParams.set('version', selectedVersion.id);
          newUrl.searchParams.set('lang', selectedLang.id);
          window.history.pushState({}, '', newUrl);
        }

        versionSelector.value = selectedVersion.id;
        langSelector.value = selectedLang.id;
        syncIframe();

        versionSelector.addEventListener('change', function () {
          selectedVersion = data.versions.find(v => v.id === this.value) || selectedVersion;
          syncIframe();
          syncUrl();
        });

        langSelector.addEventListener('change', function () {
          selectedLang = languages.find(l => l.id === this.value) || selectedLang;
          syncIframe();
          syncUrl();
        });

        window.addEventListener('popstate', function () {
          const params = new URLSearchParams(window.location.search);
          selectedVersion =
            data.versions.find(v => v.id === params.get('version')) ||
            data.versions.find(v => v.id === data.defaultVersion);
          selectedLang =
            languages.find(l => l.id === params.get('lang')) ||
            languages.find(l => l.id === (data.defaultLang || 'ja'));
          versionSelector.value = selectedVersion.id;
          langSelector.value = selectedLang.id;
          syncIframe();
        });
      } catch (e) {
        console.error('Failed to load versions.json — falling back', e);
        document.getElementById('content-frame').src = FALLBACK_PATH;
      }
    })();
  </script>
</body>
</html>
